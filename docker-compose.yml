version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lexi-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=sqlite:///./lexi.db
      - VECTOR_DB_PATH=/app/nepal_law_db
    volumes:
      - ./nepal_law_db:/app/nepal_law_db
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - lexi-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lexi-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - lexi-network

networks:
  lexi-network:
    driver: bridge
